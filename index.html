<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#EFE5CB">
  <meta name="description" content="鍛帳 — 監獄トレーニング(Convict Conditioning)ビッグ6を段位で記録する和の稽古録">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="鍛帳">
  <meta name="mobile-web-app-capable" content="yes">

  <title>鍛帳</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png">

  <!-- Fonts: Shippori Mincho for body, Yuji Syuku for brush display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;700;800&family=Yuji+Syuku&family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 UMD -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Recharts UMD (requires PropTypes) -->
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/[email protected]/umd/Recharts.js"></script>

  <style>
    :root {
      --washi: #EFE5CB;
      --washi-light: #F5EDD8;
      --washi-dark: #E5DAC0;
      --washi-line: #C4B896;
      --sumi: #1F1B15;
      --sumi-light: #4A4239;
      --sumi-dim: #7A6E5C;
      --sumi-faint: #B29A76;
      --shu: #B0322B;
      --shu-dark: #8F2723;
      --gold: #A88B5F;
    }

    html, body {
      background-color: var(--washi);
      color: var(--sumi);
      font-family: "Shippori Mincho B1", "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
    }

    /* Font utility classes */
    .font-mincho { font-family: "Shippori Mincho B1", "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif; }
    .font-brush { font-family: "Yuji Syuku", "Shippori Mincho B1", "Hiragino Mincho ProN", serif; font-weight: 400; }

    /* Washi background — warm cream */
    .washi-bg {
      background-color: var(--washi);
    }

    /* Fiber texture layered on top of anything that wants the paper feel */
    .washi-fibers {
      position: relative;
    }
    .washi-fibers::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      background-image:
        radial-gradient(at 15% 25%, rgba(176, 50, 43, 0.03) 0px, transparent 60%),
        radial-gradient(at 85% 75%, rgba(168, 139, 95, 0.05) 0px, transparent 60%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.3 0 0 0 0 0.25 0 0 0 0 0.15 0 0 0 0.4 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: auto, auto, 300px 300px;
      mix-blend-mode: multiply;
      z-index: 0;
    }
    .washi-fibers > * {
      position: relative;
      z-index: 1;
    }

    /* Cards on washi — subtle inner background + thin sumi border */
    .card-washi {
      background-color: rgba(245, 237, 216, 0.6);
      border: 1px solid var(--washi-line);
      transition: border-color 0.15s;
    }
    .card-washi:hover {
      border-color: var(--sumi-light);
    }

    /* Inputs — old ledger style */
    .input-washi {
      background-color: rgba(245, 237, 216, 0.8);
      border-color: var(--sumi-light);
      color: var(--sumi);
    }
    .input-washi:focus {
      outline: none;
      border-color: var(--shu);
      box-shadow: 0 0 0 1px var(--shu);
    }

    button:active { transform: scale(0.98); }
    button { transition: transform 0.05s; }

    /* Boot splash */
    #boot {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--sumi-dim);
      font-family: "Shippori Mincho B1", serif;
      font-size: 14px; letter-spacing: 0.4em;
      background-color: var(--washi);
      z-index: 100;
    }

    /* Style the native date input for washi feel */
    input[type="date"] {
      color-scheme: light;
    }
  </style>
</head>
<body>
  <div id="boot">開帳中...</div>
  <div id="root"></div>

  <script>
    const observer = new MutationObserver(() => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        const boot = document.getElementById('boot');
        if (boot) boot.remove();
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
  </script>

  <script src="./app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
